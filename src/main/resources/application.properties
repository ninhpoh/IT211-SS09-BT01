spring.application.name=bt01

spring.datasource.url=jdbc:mysql://localhost:3306/bt01-ss09-it211?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456$

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Config logging
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} - %-5level - %logger{50} - %msg%n
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.ra.demo.repository=WARN
logging.level.ra.demo.service=WARN
logging.level.org.springframework=WARN
logging.level.sql=WARN
logging.level.org.hibernate=WARN